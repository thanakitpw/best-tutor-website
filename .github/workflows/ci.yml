name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # TODO (optional): add a pre-commit hook job using husky + lint-staged.
  # Lead can decide whether to wire that in — we would run lint-staged on
  # staged files locally; the full suite below remains the source of truth in CI.
  verify:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Dummy values so `next build` and unit tests do not fail on missing
      # env vars. Real secrets live in the Vercel project; CI is a static
      # verification stage only (no DB, no external calls).
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      DATABASE_URL: postgresql://user:pass@localhost:5432/ci?schema=public
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ci-cloud
      CLOUDINARY_API_KEY: ci-key
      CLOUDINARY_API_SECRET: ci-secret
      LINE_CHANNEL_ACCESS_TOKEN: ci-line-token
      LINE_CHANNEL_SECRET: ci-line-secret
      RESEND_API_KEY: ci-resend-key
      NEXT_PUBLIC_SITE_URL: https://besttutorthailand.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      # NOTE: Playwright E2E is intentionally NOT run in CI yet.
      # It requires a live DB + seeded data. Wire in once a staging DB
      # is available (e.g. Supabase preview branches) and add a separate
      # job that runs `npm run test:e2e` against the Vercel preview URL.
